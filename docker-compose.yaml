version: "3.8"

services:
  redis_igt:
    image: redis/redis-stack:latest
    ports:
      - "6379:6379"
    volumes:
      - ./redis:/data
    container_name: redis_igt

  postgres:
    image: postgres:16
    container_name: demo-postgres
    restart: always
    environment:
      POSTGRES_DB: demodb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: ./demo
    container_name: demo-app
    restart: always
    depends_on:
      - postgres
      - redis_igt
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/demodb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_REDIS_HOST: redis_igt
      SPRING_REDIS_PORT: 6379

  client-app:
    build: ./client
    container_name: client-app
    restart: always
    depends_on:
      - app
    ports:
      - "8081:8081"

  listener1:
    build: ./listener1
    container_name: listener1-app
    restart: always
    depends_on:
      - app
      - client-app

  kafka:
    image: apache/kafka:latest
    container_name: demo-kafka
    restart: always
    ports:
      - "9092:9092"      # espone Kafka sulla porta 9092
    environment:
      KAFKA_NODE_ID: 1   #id nodo kafka
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093  # 9093 per la comunicazione di controllo interna
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_NUM_PARTITIONS: 3     # numero di partizioni di default per i topic nuovi

volumes:
  pgdata: